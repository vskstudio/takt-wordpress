name: CI

on:
  push:
    branches: [main]
  pull_request:

# takt-core-php is resolved from Packagist (vskstudio/takt-core-php ^0.3).
jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Lint, analyse and test
        run: composer check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: composer install --no-interaction --no-progress
      - run: npm install
      - run: npx playwright install --with-deps chromium

      - name: Start WordPress + WooCommerce
        run: npm run env:start

      - name: Configure the plugin
        run: npx wp-env run cli wp eval-file wp-content/plugins/takt-wordpress/e2e/setup-wp.php

      - name: Run end-to-end tests
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
